<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Document Summarizer</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>📄 AI Document Summarizer</h1>

    <p>
        Upload your PDF and receive an AI-generated summary directly in your inbox.
    </p>

    <form id="uploadForm">

        <label>Select PDF</label>

        <input
            type="file"
            id="pdf"
            accept=".pdf"
            required
        >

        <label>Email Address</label>

        <input
            type="email"
            id="email"
            placeholder="example@gmail.com"
            required
        >

        <button type="submit">
            Summarize PDF
        </button>

    </form>

    <div id="status"></div>

</div>

<script src="script.js"></script>

</body>
</html>
